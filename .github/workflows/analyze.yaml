name: Analyze

on:
  workflow_dispatch:
    # This workflow runs only on the feature branch

permissions:
  # This workflow has write permissions to the contents of the repository
  contents: write
  actions: write

jobs:
  analyze-documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set execution date-time variable
        id: set_datetime
        run: echo "datetime=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Copiar ficheros de contexto y documentación
        uses: actions/download-artifact@v4
        with:
          path: './contexto/el_problema_de_los_tres_cuerpos.txt'
          name: contexto

      - name: Copiar ficheros de contexto y documentación
        uses: actions/download-artifact@v4
        with:
          path: './docs/feature/producto.md'
          name: documentacion

      - name: Analizar documentación con GitHub Copilot
        uses: github/copilot-action@v1.0.20
        with:
          context: ${{ steps.context.value }}
          documentacion: ${{ steps.documentacion.value }}

      - name: Grabar resultados en un fichero
        run: |
          echo "Mejoras en la documentación:"
          cat copilot_results.txt
          echo ""
          echo "Coherencia de los escritos:"
          cat copilot_results.txt

      - name: Descargar resultados
        uses: actions/download-artifact@v4
        with:
          path: './results/copilot_results-${{ env.datetime }}.txt'
          name: resultados