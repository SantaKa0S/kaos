name: Check

on:
  workflow_dispatch:
    branches:
      - feature

permissions:
  contents: write
  actions: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate YAML Workflows
        id: validate-yaml
        run: |
          for file in .github/workflows/*.yml; do
            if ! yq e '. | type == "object"' "$file"; then
              echo "Error en archivo $file" >> results/Resume-check-yaml-$(date +"%Y%m%d%H%M%S").txt
            fi
          done
      
      - name: Subir resultados a GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Resume-check-yaml-$(date +"%Y%m%d%H%M%S")
          path: results/Resume-check-yaml-$(date +"%Y%m%d%H%M%S").txt
      
      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results/*.txt
          git commit -m "Build: New version of GitHub Actions ${{ env.CLEAN_BRANCH_NAME }}"
          git push origin feature
  
      - name: Trigger Audit
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Audit
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: feature