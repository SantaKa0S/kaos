name: Git Information

on:
  workflow_dispatch:
  
permissions:
  contents: write
  actions: write

jobs:
  git-informacion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Obtener información commit
        id: obtener-informacion
        run: |
          # Obtenemos la información del commit actual
          COMMIT_ID=$(git rev-parse HEAD)
          COMMIT_MESSAGE=$(git log -1 --format=%s)
          AUTHOR=$(git log -1 --format=%an)
          DATE=$(git log -1 --format=%cd)
      
          # Obtenemos la lista de archivos cambiados en el commit
          CHANGED_FILES=$(git diff --cached --name-only)
      
          # Obtenemos la información del branch actual
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          BRANCH_DESCRIPTION=$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)
      
          # Almacenamos la información en variables de GitHub Actions
          github.actions.set_env(
            name: 'COMMIT_ID',
            value: COMMIT_ID
          )
          github.actions.set_env(
            name: 'COMMIT_MESSAGE',
            value: COMMIT_MESSAGE
          )
          github.actions.set_env(
            name: 'AUTHOR',
            value: AUTHOR
          )
          github.actions.set_env(
            name: 'DATE',
            value: DATE
          )
          github.actions.set_env(
            name: 'CHANGED_FILES',
            value: CHANGED_FILES
          )
          github.actions.set_env(
            name: 'BRANCH_NAME',
            value: BRANCH_NAME
          )
          github.actions.set_env(
            name: 'BRANCH_DESCRIPTION',
            value: BRANCH_DESCRIPTION
          )

      - name: Mostrar contenido de variables
        run: |
          # Obtenemos el contenido de las variables guardadas
          echo "Variables guardadas:"
          echo "COMMIT_ID: ${{ github.actions.env.COMMIT_ID }}"
          echo "COMMIT_MESSAGE: ${{ github.actions.env.COMMIT_MESSAGE }}"
          echo "AUTHOR: ${{ github.actions.env.AUTHOR }}"
          echo "DATE: ${{ github.actions.env.DATE }}"
          echo "CHANGED_FILES: ${{ github.actions.env.CHANGED_FILES }}"
          echo "BRANCH_NAME: ${{ github.actions.env.BRANCH_NAME }}"
          echo "BRANCH_DESCRIPTION: ${{ github.actions.env.BRANCH_DESCRIPTION }}