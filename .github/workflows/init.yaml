name: Init Ka0S

on:
  push:
    branches:
      - 'feature/**'
      - 'feature'

permissions:
  contents: read
  actions: write

jobs:
  initprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Team Name
        id: set-branch-name
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          CLEAN_BRANCH_NAME=${BRANCH_NAME#feature/}
          echo "CLEAN_BRANCH_NAME=$CLEAN_BRANCH_NAME" >> $GITHUB_ENV

      - name: Identify User of the Team
        id: identify-user
        run: |
          user=$(git log -1 --pretty=format:'%an')
          echo "user=$user" >> $GITHUB_ENV

      - name: Display User Name and Team Name
        run: echo "Push has been performed by the user ${{ env.user }} of the Team ${{ env.CLEAN_BRANCH_NAME }}"

      - name: Identify Changed Files
        id: changed-files
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} > changed-files.txt
          cat changed-files.txt

      - name: Exist changes in files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          templates_changed=false
          docs_changed=false
          yaml_changed=false
          py_changed=false
      
          while IFS= read -r file; do
            case "$file" in
              templates/*.md)
                templates_changed=true
                ;;
              docs/*.md)
                docs_changed=true
                ;;
              .github/workflows/*.yaml)
                yaml_changed=true
                ;;
              bin/*.py)
                py_changed=true
                ;;
            esac
          done < changed-files.txt
      
          if [ "$templates_changed" = true ]; then
            echo "Triggering Lint Templates workflow..."
            gh workflow run lintemplates.yaml --ref feature
          fi
      
          if [ "$docs_changed" = true ]; then
            echo "Triggering md Lint workflow..."
            gh workflow run lint.yaml --ref feature
          fi
      
          if [ "$yaml_changed" = true ]; then
            echo "Triggering Check YAML workflow..."
            gh workflow run check.yaml --ref feature
          fi
      
          if [ "$py_changed" = true ]; then
            echo "Triggering checkpy.yaml workflow..."
            gh workflow run checkpy.yaml --ref feature
          fi